kind = "web"
previewPath = "/"
title = "Inhaler Usage Monitor"
version = "1.0.0"
id = "artifacts/inhaler-monitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20162

[services.development]
run = "pnpm --filter @workspace/inhaler-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/inhaler-monitor", "run", "build" ]
publicDir = "artifacts/inhaler-monitor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20162"
BASE_PATH = "/"
